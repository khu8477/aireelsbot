name: Post Reels Auto
on:
  schedule:
    - cron: '0 12,19 *' # 12:00 UTC = 1pm المغرب | 19:00 UTC = 8pm المغرب
  workflow_dispatch: # باش تقدر تشغلو يدوي
jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: pip install google-generativeai moviepy gTTS requests
      - run: python bot.py
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          HAILUO_KEY: ${{ secrets.HAILUO_KEY }}
          FB_TOKEN: ${{ secrets.FB_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
